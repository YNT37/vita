# Vita：Docker Compose + PostgreSQL + Caddy（:80）
# 完整步骤见 docs/部署教程.md 方式 E
#
# 准备：
#   cp backend/.env.example backend/.env && vim backend/.env
#   cp deploy/postgres.env.example deploy/postgres.env && vim deploy/postgres.env
#   # backend/.env 中 DATABASE_URL=postgresql://vita:密码@db:5432/vita
#   # 密码须与 deploy/postgres.env 的 POSTGRES_PASSWORD 一致
#
# 启动：
#   docker compose -f docker-compose.postgres.yml --env-file deploy/postgres.env up -d --build

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vita}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 deploy/postgres.env 设置 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vita}
    volumes:
      - vita_pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGINS: "*"
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ""
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend

volumes:
  vita_pgdata:
